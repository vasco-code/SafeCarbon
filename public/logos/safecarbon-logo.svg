<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark teal background -->
  <rect width="200" height="200" rx="32" fill="#0f5545"/>

  <!-- Cloud outline -->
  <path d="M 65 95 Q 55 95 50 85 Q 50 75 60 70 Q 65 55 80 55 Q 92 55 100 65 Q 110 60 120 65 Q 135 65 140 80 Q 150 80 150 90 Q 150 105 135 110 Z"
        fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- CO2 text inside cloud -->
  <text x="100" y="95" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">
    CO
  </text>
  <text x="125" y="100" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="start" dominant-baseline="middle">
    2
  </text>

  <!-- Arrow line pointing to CO2 -->
  <line x1="130" y1="78" x2="145" y2="75" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Green triangle/leaf pointing down -->
  <polygon points="100,115 80,145 120,145" fill="#b8d80a"/>

  <!-- SafeCarbon text at bottom -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="white" text-anchor="middle">safe</text>
  <text x="135" y="165" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#b8d80a" text-anchor="start">Carbon</text>
</svg>